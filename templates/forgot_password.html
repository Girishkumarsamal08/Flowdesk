{% extends "base.html" %}

{% block title %}FLOWDESK | Password Recovery{% endblock %}

{% block content %}
<div style="max-width: 450px; margin: 6rem auto;">
    <!-- Success Toast (Hidden by default) -->
    <div id="successToast" style="display: none; position: fixed; top: 2rem; right: 2rem; background: var(--success); color: white; padding: 1rem 2rem; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); z-index: 1000; animation: slideIn 0.3s ease;">
        Password changed successfully.
    </div>

    <div style="text-align: center; margin-bottom: 2.5rem;">
        <h1 style="font-size: 2.5rem; margin-bottom: 0.5rem;">Recovery</h1>
        <p id="stepDescription" style="color: var(--text-secondary);">Enter your email to receive a recovery code.</p>
    </div>
    
    <div class="card">
        <!-- STEP 1: ENTER EMAIL -->
        <form id="requestForm">
            <div class="form-group">
                <label for="email">Registered Email</label>
                <input type="email" id="email" required placeholder="name@company.com">
            </div>
            <button type="submit" id="requestBtn" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Send Reset Code</button>
        </form>

        <!-- STEP 2: VERIFY CODE (Hidden) -->
        <form id="verifyForm" style="display: none;">
            <div class="form-group">
                <label for="code">Verification Code</label>
                <input type="text" id="code" required placeholder="123456" maxlength="6" style="text-align: center; letter-spacing: 0.5rem; font-size: 1.5rem;">
            </div>
            <button type="submit" id="verifyBtn" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Verify Code</button>
        </form>

        <!-- STEP 3: NEW PASSWORD (Hidden) -->
        <form id="resetForm" style="display: none;">
            <div class="form-group">
                <label for="newPassword">New Password</label>
                <div style="position: relative;">
                    <input type="password" id="newPassword" required placeholder="••••••••" style="padding-right: 3.5rem;">
                    <button type="button" onclick="togglePassword('newPassword', this)" style="position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-secondary); cursor: pointer; display: flex; align-items: center; justify-content: center; width: 24px; height: 24px; padding: 0;">
                        <svg class="eyeClosed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 100%; height: 100%;">
                            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                            <line x1="1" y1="1" x2="23" y2="23"></line>
                        </svg>
                        <svg class="eyeOpen" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 100%; height: 100%; display: none;">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </button>
                </div>
            </div>
            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <div style="position: relative;">
                    <input type="password" id="confirmPassword" required placeholder="••••••••" style="padding-right: 3.5rem;">
                    <button type="button" onclick="togglePassword('confirmPassword', this)" style="position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-secondary); cursor: pointer; display: flex; align-items: center; justify-content: center; width: 24px; height: 24px; padding: 0;">
                        <svg class="eyeClosed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 100%; height: 100%;">
                            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                            <line x1="1" y1="1" x2="23" y2="23"></line>
                        </svg>
                        <svg class="eyeOpen" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 100%; height: 100%; display: none;">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </button>
                </div>
            </div>
            <button type="submit" id="resetBtn" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Change Password</button>
        </form>
    </div>
    
    <p style="text-align: center; margin-top: 1.5rem;">
        <a href="/company/auth" style="color: var(--text-secondary); text-decoration: none;">← Back to Login</a>
    </p>
</div>

<style>
@keyframes slideIn {
    from { transform: translateX(100%); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
}
</style>
{% endblock %}

{% block extra_scripts %}
<script>
    function togglePassword(id, btn) {
        const input = document.getElementById(id);
        const closedIcon = btn.querySelector('.eyeClosed');
        const openIcon = btn.querySelector('.eyeOpen');
        
        if (input.type === 'password') {
            input.type = 'text';
            closedIcon.style.display = 'none';
            openIcon.style.display = 'block';
        } else {
            input.type = 'password';
            closedIcon.style.display = 'block';
            openIcon.style.display = 'none';
        }
    }

    let userEmail = '';
    let resetCode = '';

    const requestForm = document.getElementById('requestForm');
    const verifyForm = document.getElementById('verifyForm');
    const resetForm = document.getElementById('resetForm');
    const stepDescription = document.getElementById('stepDescription');
    const successToast = document.getElementById('successToast');

    // STEP 1: Request Code
    requestForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        userEmail = document.getElementById('email').value;
        const btn = document.getElementById('requestBtn');
        btn.disabled = true;

        const res = await fetch('/api/users/forgot-password/request', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: userEmail })
        });

        if (res.ok) {
            requestForm.style.display = 'none';
            verifyForm.style.display = 'block';
            stepDescription.innerText = 'We sent a 6-digit code to your email.';
        } else {
            alert('Email not found');
            btn.disabled = false;
        }
    });

    // STEP 2: Verify Code
    verifyForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        resetCode = document.getElementById('code').value;
        const btn = document.getElementById('verifyBtn');
        btn.disabled = true;

        const res = await fetch('/api/users/forgot-password/verify', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: userEmail, code: resetCode })
        });

        if (res.ok) {
            verifyForm.style.display = 'none';
            resetForm.style.display = 'block';
            stepDescription.innerText = 'Enter your new secure password.';
        } else {
            alert('Invalid code');
            btn.disabled = false;
        }
    });

    // STEP 3: Reset Password
    resetForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const newPass = document.getElementById('newPassword').value;
        const confirmPass = document.getElementById('confirmPassword').value;
        
        if (newPass !== confirmPass) return alert('Passwords do not match');
        
        const btn = document.getElementById('resetBtn');
        btn.disabled = true;

        const res = await fetch('/api/users/forgot-password/reset', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: userEmail, code: resetCode, new_password: newPass })
        });

        if (res.ok) {
            successToast.style.display = 'block';
            setTimeout(() => {
                window.location.href = '/company/auth';
            }, 2000);
        } else {
            alert('Error resetting password');
            btn.disabled = false;
        }
    });
</script>
{% endblock %}
