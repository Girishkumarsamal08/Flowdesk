{% extends "base.html" %}

{% block content %}
<div style="max-width: 450px; margin: 6rem auto;">
    <div style="text-align: center; margin-bottom: 2.5rem;">
        <h1 style="font-size: 2.5rem; margin-bottom: 0.5rem;">Welcome Back</h1>
        <p style="color: var(--text-secondary);">Login to manage your support workspace.</p>
    </div>
    
    <div class="card">
        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" required placeholder="name@company.com">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>
            
            <div style="margin-top: 2rem;">
                <button type="submit" id="submitBtn" class="btn btn-primary" style="width: 100%;">Sign In</button>
            </div>
        </form>
    </div>
    
    <p style="text-align: center; margin-top: 1.5rem; color: var(--text-secondary);">
        Don't have an account? <a href="/register" style="color: var(--primary);">Register your company</a>
    </p>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const originalText = btn.innerText;
        btn.innerText = 'Verifying...';
        btn.disabled = true;

        const payload = {
            email: document.getElementById('email').value,
            password: document.getElementById('password').value
        };

        try {
            const response = await fetch('/api/users/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                const data = await response.json();
                localStorage.setItem('token', data.access_token);
                btn.innerText = 'Success! Entering Dashboard...';
                
                
                
                setTimeout(() => window.location.href = '/dashboard', 1000);
            } else {
                alert('Invalid credentials');
                btn.innerText = originalText;
                btn.disabled = false;
            }
        } catch (err) {
            console.error(err);
            alert('Network error');
            btn.innerText = originalText;
            btn.disabled = false;
        }
    });
</script>
{% endblock %}
