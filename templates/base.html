<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Flowdesk{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/styles.css">
    {% block extra_head %}{% endblock %}
</head>
<body>
    <div class="glass-bg"></div>
    <nav class="navbar">
        <a href="/" class="logo">FLOWDESK</a>
        <div class="nav-links">
            <a href="/">Submit Ticket</a>
            <a href="/dashboard">Agent Dashboard</a>
            <a href="/analytics">Live Analytics</a>
        </div>
    </nav>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    <script>
        // Micro-interaction for all standard buttons
        document.querySelectorAll('.btn').forEach(btn => {
            btn.addEventListener('mousedown', () => btn.style.transform = 'scale(0.95)');
            btn.addEventListener('mouseup', () => btn.style.transform = 'scale(1)');
            btn.addEventListener('mouseleave', () => btn.style.transform = 'scale(1)');
        });
    </script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
