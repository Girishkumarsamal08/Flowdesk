{% extends "base.html" %}

{% block content %}
<div style="max-width: 600px; margin: 4rem auto;">
    <h1 style="text-align: center; margin-bottom: 2rem; font-size: 2.5rem;">How can we help?</h1>
    <div class="card">
        <form id="contactForm">
            <div class="form-group">
                <label for="name">Your Name</label>
                <input type="text" id="name" required placeholder="John Doe">
            </div>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" required placeholder="john@example.com">
            </div>
            <div class="form-group">
                <label for="title">Subject</label>
                <input type="text" id="title" required placeholder="Issue with recent order">
            </div>
            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" required placeholder="Please describe your issue in detail..."></textarea>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Submit Ticket</button>
        </form>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
    document.getElementById('contactForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const btn = e.target.querySelector('button');
        const originalText = btn.innerText;
        btn.innerText = 'Submitting...';
        btn.disabled = true;

        const payload = {
            title: document.getElementById('title').value,
            customer_email: document.getElementById('email').value,
            customer_name: document.getElementById('name').value,
            initial_message: document.getElementById('message').value
        };

        try {
            const response = await fetch('/api/tickets/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                const data = await response.json();
                btn.innerText = 'Success!';
                btn.style.background = 'var(--success)';
                
                setTimeout(() => {
                    window.location.href = `/dashboard/ticket/${data.id}`;
                }, 1000);
            } else {
                alert('Error creating ticket');
                btn.innerText = originalText;
                btn.disabled = false;
            }
        } catch (err) {
            console.error(err);
            alert('Network error');
            btn.innerText = originalText;
            btn.disabled = false;
        }
    });
</script>
{% endblock %}
