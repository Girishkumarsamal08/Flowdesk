{% extends "base.html" %}

{% block content %}
<div style="max-width: 600px; margin: 4rem auto;">
    <h1 id="formHeader" style="text-align: center; margin-bottom: 2rem; font-size: 2.5rem;">Get Support</h1>
    <div class="card">
        <form id="contactForm">
            <div class="form-group">
                <label for="name">Your Name</label>
                <input type="text" id="name" required placeholder="John Doe">
            </div>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" required placeholder="john@example.com">
            </div>
            <div class="form-group">
                <label for="title">Subject</label>
                <input type="text" id="title" required placeholder="Issue with recent order">
            </div>
            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" required placeholder="Please describe your issue in detail..."></textarea>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Submit Ticket</button>
        </form>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
    document.getElementById('contactForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const btn = e.target.querySelector('button');
        const originalText = btn.innerText;
        btn.innerText = 'Submitting...';
        btn.disabled = true;

        const payload = {
            organization_id: parseInt("{{ org_id }}"),
            title: document.getElementById('title').value,
            customer_email: document.getElementById('email').value,
            customer_name: document.getElementById('name').value,
            initial_message: document.getElementById('message').value
        };

        try {
            const response = await fetch('/api/tickets/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                const data = await response.json();
                document.getElementById('formHeader').innerText = 'Request Logged';
                document.querySelector('.card').innerHTML = `
                    <div style="text-align: center; padding: 3rem 2rem;">
                        <h2 style="margin-bottom: 1rem; color: var(--success);">Request Received</h2>
                        <p style="color: var(--text-secondary); margin-bottom: 2rem; line-height: 1.6;">
                            Your support request has been logged successfully.<br>
                            Tracking Token: <strong style="font-size: 1.2rem; color: white;">#${data.token}</strong>
                        </p>
                        <div style="display: flex; flex-direction: column; gap: 1rem;">
                            <a href="/support/track/${data.token}" class="btn btn-primary" style="padding: 0.8rem 2rem;">Track My Request</a>
                            <a href="/" style="color: var(--text-secondary); text-decoration: none; font-size: 0.9rem;">Return to Home</a>
                        </div>
                    </div>
                `;
            } else {
                const errorData = await response.json();
                alert('Server Error (' + response.status + '): ' + (errorData.detail || 'Unknown error'));
                btn.innerText = originalText;
                btn.disabled = false;
            }
        } catch (err) {
            console.error(err);
            alert('Connection Failed: ' + err.message + '. Please ensure the server is running on port 8000.');
            btn.innerText = originalText;
            btn.disabled = false;
        }
    });
</script>
{% endblock %}
