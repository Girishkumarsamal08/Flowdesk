{% extends "base.html" %}

{% block title %}FLOWDESK | Company Auth{% endblock %}

{% block content %}
<div style="max-width: 450px; margin: 6rem auto;">
    <div style="text-align: center; margin-bottom: 2.5rem;">
        <h1 id="authTitle" style="font-size: 2.5rem; margin-bottom: 0.5rem;">Company Login</h1>
        <p id="authSubtitle" style="color: var(--text-secondary);">Login to manage your support workspace.</p>
    </div>
    
    <div class="card">
        <form id="authForm">
            
            <div id="registerFields" style="display: none;">
                <div class="form-group">
                    <label for="company_name">Company Name</label>
                    <input type="text" id="company_name" placeholder="Acme Corp">
                </div>
                <div class="form-group">
                    <label for="company_type">Company Category</label>
                    <select id="company_type" style="width: 100%; padding: 0.8rem; background: rgba(255,255,255,0.03); color: white; border: 1px solid var(--glass-border); border-radius: 8px;">
                        <option value="Ecommerce">E-commerce</option>
                        <option value="SaaS">SaaS / Tech</option>
                        <option value="Healthcare">Healthcare</option>
                        <option value="Legal">Legal / Law Firm</option>
                        <option value="Education">Education</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="domain">Company Domain</label>
                    <input type="text" id="domain" placeholder="acme.com">
                </div>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" required placeholder="name@company.com">
            </div>
            <div class="form-group">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <label for="password">Password</label>
                    <a href="/forgot-password" style="font-size: 0.8rem; color: var(--primary); text-decoration: none;">Forgot?</a>
                </div>
                <div style="position: relative;">
                    <input type="password" id="password" required placeholder="••••••••" style="padding-right: 3.5rem;">
                    <button type="button" onclick="togglePassword('password', this)" style="position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-secondary); cursor: pointer; display: flex; align-items: center; justify-content: center; width: 24px; height: 24px; padding: 0;">
                        
                        <svg id="eyeClosed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 100%; height: 100%;">
                            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                            <line x1="1" y1="1" x2="23" y2="23"></line>
                        </svg>
                        
                        <svg id="eyeOpen" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 100%; height: 100%; display: none;">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </button>
                </div>
            </div>
            
            <div style="margin-top: 2rem;">
                <button type="submit" id="submitBtn" class="btn btn-primary" style="width: 100%;">Sign In</button>
            </div>
        </form>
    </div>
    
    <p style="text-align: center; margin-top: 1.5rem; color: var(--text-secondary);">
        <span id="toggleText">Don't have an account?</span> 
        <a href="#" id="authToggle" style="color: var(--primary);">Register your company</a>
    </p>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
    function togglePassword(id, btn) {
        const input = document.getElementById(id);
        const closedIcon = btn.querySelector('#eyeClosed');
        const openIcon = btn.querySelector('#eyeOpen');
        
        if (input.type === 'password') {
            input.type = 'text';
            closedIcon.style.display = 'none';
            openIcon.style.display = 'block';
        } else {
            input.type = 'password';
            closedIcon.style.display = 'block';
            openIcon.style.display = 'none';
        }
    }

    let isLogin = true;
    const authToggle = document.getElementById('authToggle');
    const authTitle = document.getElementById('authTitle');
    const authSubtitle = document.getElementById('authSubtitle');
    const toggleText = document.getElementById('toggleText');
    const registerFields = document.getElementById('registerFields');
    const submitBtn = document.getElementById('submitBtn');

    authToggle.addEventListener('click', (e) => {
        e.preventDefault();
        isLogin = !isLogin;
        
        if (isLogin) {
            authTitle.innerText = 'Company Login';
            authSubtitle.innerText = 'Login to manage your support workspace.';
            toggleText.innerText = "Don't have an account?";
            authToggle.innerText = 'Register your company';
            submitBtn.innerText = 'Sign In';
            registerFields.style.display = 'none';
        } else {
            authTitle.innerText = 'Register Company';
            authSubtitle.innerText = 'Start automating your support in minutes.';
            toggleText.innerText = "Already have an account?";
            authToggle.innerText = 'Login here';
            submitBtn.innerText = 'Create Account';
            registerFields.style.display = 'block';
        }
    });

    document.getElementById('authForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        submitBtn.disabled = true;
        const originalText = submitBtn.innerText;
        submitBtn.innerText = 'Processing...';

        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        try {
            if (isLogin) {
                
                const response = await fetch('/api/users/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                if (response.ok) {
                    const data = await response.json();
                    localStorage.setItem('token', data.access_token);
                    window.location.href = '/company/dashboard';
                } else {
                    alert('Invalid credentials');
                    submitBtn.disabled = false;
                    submitBtn.innerText = originalText;
                }
            } else {
                
                const payload = {
                    name: document.getElementById('company_name').value,
                    domain: document.getElementById('domain').value,
                    company_type: document.getElementById('company_type').value,
                    support_email: email,
                    password: password
                };

                const response = await fetch('/api/orgs/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    alert('Registration successful! Redirecting to login...');
                    isLogin = true;
                    
                    authTitle.innerText = 'Company Login';
                    authSubtitle.innerText = 'Login to manage your support workspace.';
                    toggleText.innerText = "Don't have an account?";
                    authToggle.innerText = 'Register your company';
                    submitBtn.innerText = 'Sign In';
                    registerFields.style.display = 'none';
                    
                    submitBtn.disabled = false;
                    submitBtn.innerText = 'Sign In';
                } else {
                    const err = await response.json();
                    alert(err.detail || 'Registration failed');
                    submitBtn.disabled = false;
                    submitBtn.innerText = originalText;
                }
            }
        } catch (err) {
            console.error(err);
            alert('Network error');
            submitBtn.disabled = false;
            submitBtn.innerText = originalText;
        }
    });
</script>
{% endblock %}
